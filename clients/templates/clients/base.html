{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Gestion des Clients{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <header class="header">
        <div class="container">
            <a href="{% url 'liste_clients' %}" class="logo-wrap">
                <div class="logo-icon">GC</div>
                <div class="logo-text">
                    <span class="logo">Gestion Clients</span>
                    <span class="logo-sub">Agence commerciale</span>
                </div>
            </a>
            <nav class="nav">
                <a href="{% url 'liste_clients' %}"
                   class="nav-link {% if request.resolver_match.url_name == 'liste_clients' %}active{% endif %}">
                    Liste
                </a>
                <a href="{% url 'ajouter_client' %}"
                   class="nav-link nav-link-primary {% if request.resolver_match.url_name == 'ajouter_client' %}active{% endif %}">
                    + Ajouter
                </a>
            </nav>
        </div>
    </header>

    <main class="container main">
        {% if messages %}
        <div class="messages">
            {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">{{ message }}</div>
            {% endfor %}
        </div>
        {% endif %}

        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="container">
            <p>Mini-projet Django — Gestion des clients</p>
        </div>
    </footer>
</body>
</html>
